name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        id: tests
        continue-on-error: true
        run: bun test --reporter=default --reporter=junit --reporter-outfile=./junit.xml

      - name: Test Report
        uses: ctrf-io/github-test-reporter@v1
        if: always()
        with:
          report-path: ./junit.xml
          summary-report: true
          failed-report: true
          annotate: true
          integrations-config: |
            {
              "junit-to-ctrf": {
                "enabled": true,
                "action": "convert"
              }
            }

      - name: Check test results
        if: steps.tests.outcome == 'failure'
        run: exit 1

      - name: Build
        run: bun run build
